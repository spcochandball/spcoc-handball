<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tarifs et Horaires - SPCOC Handball</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --rouge-spcoc: #e30613;
      --black: #000000;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }

    header {
      background-color: white;
      color: var(--rouge-spcoc);
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      border-bottom: 3px solid var(--rouge-spcoc);
    }

    header img {
      max-height: 70px;
      height: auto;
      width: auto;
    }

    header h1 {
      margin: 0;
      font-size: 1.8em;
      color: var(--rouge-spcoc);
    }

    main {
      max-width: 950px;
      margin: 20px auto;
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    /* TABLEAU STYLISÉ */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 10px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 12px 10px;
      text-align: center;
    }

    th {
      background: var(--rouge-spcoc);
      color: white;
      font-size: 0.95em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    tbody tr:nth-child(even) {
      background-color: #fafafa;
    }

    tbody tr:nth-child(odd) {
      background-color: #fff;
    }

    tbody tr:hover {
      background-color: #ffecec;
      transition: background-color 0.1s ease-in-out;
    }

    td {
      border-bottom: 1px solid #eee;
      font-size: 0.95em;
      line-height: 1.4;
    }

    td b {
      color: var(--black);
    }

    /* Colonnes équilibrées */
    td[data-label="Catégorie"] { width: 15%; font-weight: 600; }
    td[data-label="Années"] { width: 15%; }
    td[data-label="Horaires et Lieux"] { width: 55%; text-align: left; }
    td[data-label="Tarif"] { width: 15%; font-weight: 600; color: var(--rouge-spcoc); }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    li {
      margin-bottom: 5px;
    }

    .info-encart {
      background-color: #fff3f3; 
      border-left: 5px solid var(--rouge-spcoc); 
      padding: 15px; 
      margin: 20px 0; 
      border-radius: 6px;
    }

    .info-encart h3 {
      margin-top: 0; 
      margin-bottom: 10px;
      color: var(--rouge-spcoc);
    }

    /* BLOCS FLEX */
    .bloc-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    
    .bloc {
      background-color: #fff;
      border: 1px solid #ddd;
      border-top: 3px solid var(--rouge-spcoc);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      flex: 1 1 300px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      max-width: 450px;
    }
    
    .bloc h3 {
      color: var(--rouge-spcoc);
      margin-top: 0;
      margin-bottom: 10px;
    }
    
    .bloc-inscription img {
      max-width: 110px;
      height: auto;
      margin: 10px auto 0 auto;
      display: block;
    }

    .bloc-contact a {
      color: var(--rouge-spcoc);
      font-weight: 600;
      text-decoration: none;
    }
    
    footer {
      text-align: center;
      margin: 30px 0;
      color: #777;
      font-size: 0.9em;
    }

    /* TABLEAU RESPONSIVE (MOBILE) */
    @media (max-width: 768px) {
      header { flex-direction: column; height: auto; padding: 15px; text-align: center; gap: 5px; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; background-color: #fff; }
      td { text-align: left; padding: 8px 5px; border: none; position: relative; width: 100% !important; }
      td::before { content: attr(data-label) " : "; font-weight: 600; color: var(--rouge-spcoc); }
    }
